<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网课录制助手</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      button {
        flex: 1;
        border: none;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }

      #startBtn {
        background: #1677ff;
        color: #fff;
      }

      #stopBtn {
        background: #f5f5f5;
      }

      #status {
        font-size: 12px;
        color: #666;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h1>网课录制助手</h1>
    <div class="buttons">
      <button id="startBtn">开始录制</button>
      <button id="stopBtn">停止录制</button>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
  </html>
